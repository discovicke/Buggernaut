name: PR Validation

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "Buggernaut/**"
      - ".github/workflows/**"

concurrency:
  group: pr-validation-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Buggernaut
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Buggernaut.sln

      - name: Build
        run: dotnet build Buggernaut.sln --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test Buggernaut.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-test-results
          path: Buggernaut/**/TestResults/**
          if-no-files-found: warn
