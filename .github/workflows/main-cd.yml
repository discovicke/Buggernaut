name: Main CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - "Buggernaut/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: main-cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Build and test on main
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Buggernaut
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Buggernaut.sln

      - name: Build
        run: dotnet build Buggernaut.sln --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test Buggernaut.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-test-results
          path: Buggernaut/**/TestResults/**
          if-no-files-found: warn

  package:
    name: Publish app artifacts
    runs-on: ubuntu-latest
    needs: quality-gate
    defaults:
      run:
        working-directory: Buggernaut
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish exercises project
        run: dotnet publish src/Buggernaut.Exercises/Buggernaut.Exercises.csproj --configuration Release --output ../artifacts/exercises

      - name: Publish generator tool
        run: dotnet publish tools/Buggernaut.Generator/Buggernaut.Generator.csproj --configuration Release --output ../artifacts/generator

      - name: Upload publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: main-publish-artifacts
          path: artifacts/**
          if-no-files-found: error

